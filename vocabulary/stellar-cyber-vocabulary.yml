vocabulary:
  name: Stellar Cyber Open XDR Vocabulary
  description: >-
    Domain vocabulary for the Stellar Cyber Open XDR platform covering security
    operations, detection, investigation, and response concepts.
  version: '1.0'
  created: '2026-05-02'
  modified: '2026-05-02'

terms:
  - term: Open XDR
    definition: >-
      Extended Detection and Response that ingests and correlates data from
      any security tool, vendor-agnostic, to provide unified threat detection
      and response across the entire security stack.
    category: Platform

  - term: Case
    definition: >-
      A formal investigation record in Stellar Cyber that groups related alerts,
      events, and observables for analysis by security analysts.
    category: Security Operations

  - term: Alert
    definition: >-
      A notification generated by the Stellar Cyber AI engine indicating
      suspicious or malicious activity detected in the environment.
    category: Detection

  - term: Tenant
    definition: >-
      An isolated organizational unit in the Stellar Cyber multi-tenant
      architecture, used for MSSPs managing multiple customer environments.
    category: Administration

  - term: Connector
    definition: >-
      A configured integration that pulls security telemetry from a data source
      into the Stellar Cyber platform for analysis.
    category: Integration

  - term: Sensor
    definition: >-
      A lightweight data collector deployed in the customer environment that
      sends network traffic, logs, and events to the Stellar Cyber platform.
    category: Infrastructure

  - term: Watchlist
    definition: >-
      A curated list of threat indicators (IPs, domains, hashes) that Stellar
      Cyber monitors for matches in ingested telemetry.
    category: Threat Intelligence

  - term: Playbook
    definition: >-
      An ATH (Automated Threat Hunting) automated response workflow that
      executes predefined actions when a trigger condition is met.
    category: Automation

  - term: JWT
    definition: >-
      JSON Web Token used for API authentication in Stellar Cyber. Generated
      from an API key via the /access_token endpoint, valid for 10 minutes.
    category: Authentication

  - term: API Key
    definition: >-
      A scoped credential generated per user in Stellar Cyber's administration
      interface, used to obtain JWT tokens for API authentication.
    category: Authentication

  - term: Super Admin
    definition: >-
      The highest privilege level in Stellar Cyber with root scope, required
      for tenant administration and all-access API token generation.
    category: Access Control

  - term: RBAC
    definition: >-
      Role-Based Access Control governing which platform features and API
      endpoints a user can access based on their assigned role.
    category: Access Control

  - term: Observable
    definition: >-
      A threat indicator or artifact associated with a security case, such as
      an IP address, domain, file hash, or user account.
    category: Investigation

  - term: Severity
    definition: >-
      The impact rating of a security alert: critical, high, medium, low, or
      informational.
    category: Classification

  - term: ElasticSearch Query
    definition: >-
      Direct query access to Stellar Cyber's underlying data store for advanced
      analytics and custom threat hunting using the Elasticsearch query DSL.
    category: Analytics

  - term: Checkpoint
    definition: >-
      A timestamp stored per connector indicating the last data pull point,
      used to ensure continuous and non-duplicated data ingestion.
    category: Integration

categories:
  - Platform
  - Security Operations
  - Detection
  - Administration
  - Integration
  - Infrastructure
  - Threat Intelligence
  - Automation
  - Authentication
  - Access Control
  - Investigation
  - Classification
  - Analytics
