apis:
- aid: stellar-cyber:stellar-cyber
  name: Stellar Cyber Open XDR API
  description: The Stellar Cyber REST API provides programmatic access to the Open XDR platform, enabling automation of security
    operations including case management, tenant administration, connector management, alert handling, query operations, user
    management, watchlists, sensors, and security event management. The API uses JWT-based authentication and is available
    at the base path /connect/api/v1/ on the platform hostname.
  humanURL: https://docs.stellarcyber.ai/
  baseURL: https://{platform-hostname}/connect/api/v1
