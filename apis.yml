aid: stellar-cyber
name: Stellar Cyber
description: Stellar Cyber is an Open XDR platform that provides AI-driven security operations capabilities including threat
  detection, investigation, and response. The platform offers an OAS-compliant REST API that enables downstream applications
  to perform complex queries, join results, analyze data, and automate security operations workflows. Stellar Cyber maintains
  several sample Python Jupyter Notebooks in GitHub that can help build analyses outside of the platform with the API or connect
  custom applications.
