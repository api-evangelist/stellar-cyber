naftiko: 1.0.0-alpha2
info:
  label: Stellar Cyber Open XDR API — Events
  description: 'Stellar Cyber Open XDR API — Events. 1 operations. Lead operation: Ingest Events. Self-contained Naftiko capability
    covering one Stellar Cyber business surface.'
  tags:
  - Stellar Cyber
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STELLAR_CYBER_API_KEY: STELLAR_CYBER_API_KEY
capability:
  consumes:
  - type: http
    namespace: stellar-cyber-events
    baseUri: https://{platformHostname}/connect/api/v1
    description: Stellar Cyber Open XDR API — Events business capability. Self-contained, no shared references.
    resources:
    - name: events
      path: /events
      operations:
      - name: ingestevents
        method: POST
        description: Ingest Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.STELLAR_CYBER_API_KEY}}'
  exposes:
  - type: rest
    namespace: stellar-cyber-events-rest
    port: 8080
    description: REST adapter for Stellar Cyber Open XDR API — Events. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/events
      name: events
      description: REST surface for events.
      operations:
      - method: POST
        name: ingestevents
        description: Ingest Events
        call: stellar-cyber-events.ingestevents
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stellar-cyber-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stellar Cyber Open XDR API — Events. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: ingest-events
      description: Ingest Events
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stellar-cyber-events.ingestevents
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
