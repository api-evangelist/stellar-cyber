naftiko: 1.0.0-alpha2
info:
  label: Stellar Cyber Open XDR API — Authentication
  description: 'Stellar Cyber Open XDR API — Authentication. 1 operations. Lead operation: Get Access Token. Self-contained
    Naftiko capability covering one Stellar Cyber business surface.'
  tags:
  - Stellar Cyber
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STELLAR_CYBER_API_KEY: STELLAR_CYBER_API_KEY
capability:
  consumes:
  - type: http
    namespace: stellar-cyber-authentication
    baseUri: https://{platformHostname}/connect/api/v1
    description: Stellar Cyber Open XDR API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: access_token
      path: /access_token
      operations:
      - name: getaccesstoken
        method: POST
        description: Get Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.STELLAR_CYBER_API_KEY}}'
  exposes:
  - type: rest
    namespace: stellar-cyber-authentication-rest
    port: 8080
    description: REST adapter for Stellar Cyber Open XDR API — Authentication. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/access-token
      name: access-token
      description: REST surface for access_token.
      operations:
      - method: POST
        name: getaccesstoken
        description: Get Access Token
        call: stellar-cyber-authentication.getaccesstoken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stellar-cyber-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stellar Cyber Open XDR API — Authentication. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-access-token
      description: Get Access Token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: stellar-cyber-authentication.getaccesstoken
      outputParameters:
      - type: object
        mapping: $.
