naftiko: "1.0.0-alpha1"

info:
  label: "Stellar Cyber Open XDR API"
  description: >-
    REST API for the Stellar Cyber Open XDR platform providing programmatic access
    to case management, tenant administration, connectors, alerts, events, queries,
    watchlists, sensors, reports, and playbooks.
  tags:
    - Stellar Cyber
    - Cybersecurity
    - XDR
    - SIEM
    - SOAR
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      STELLAR_CYBER_JWT_TOKEN: STELLAR_CYBER_JWT_TOKEN
      STELLAR_CYBER_API_KEY: STELLAR_CYBER_API_KEY
      STELLAR_CYBER_HOSTNAME: STELLAR_CYBER_HOSTNAME

capability:
  consumes:
    - type: http
      namespace: stellar-cyber
      baseUri: "https://{{env.STELLAR_CYBER_HOSTNAME}}/connect/api/v1"
      description: "Stellar Cyber Open XDR platform REST API"
      authentication:
        type: bearer
        token: "{{env.STELLAR_CYBER_JWT_TOKEN}}"
      resources:
        - name: authentication
          path: /access_token
          description: JWT token generation from API key
          operations:
            - name: get-access-token
              method: POST
              description: Generate a JWT access token using an API key
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: cases
          path: /cases
          description: Security case management
          operations:
            - name: list-cases
              method: GET
              description: Retrieve a list of security cases
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum number of cases to return
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Pagination offset
                - name: status
                  in: query
                  type: string
                  required: false
                  description: Filter by status
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-case
              method: POST
              description: Create a new security case
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  priority: "{{tools.priority}}"

        - name: case
          path: /cases/{caseId}
          description: Individual case management
          operations:
            - name: get-case
              method: GET
              description: Retrieve details of a specific case
              inputParameters:
                - name: caseId
                  in: path
                  type: string
                  required: true
                  description: Unique case identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-case
              method: PUT
              description: Update case status and attributes
              inputParameters:
                - name: caseId
                  in: path
                  type: string
                  required: true
                  description: Unique case identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  status: "{{tools.status}}"
                  priority: "{{tools.priority}}"

        - name: tenants
          path: /tenants
          description: Multi-tenant administration
          operations:
            - name: list-tenants
              method: GET
              description: Retrieve all tenants
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-tenant
              method: POST
              description: Create a new tenant
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"

        - name: connectors
          path: /connectors
          description: Data connector management
          operations:
            - name: list-connectors
              method: GET
              description: Retrieve all configured connectors
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-connector
              method: POST
              description: Create a new data connector
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  type: "{{tools.type}}"

        - name: alerts
          path: /alerts
          description: Alert management
          operations:
            - name: list-alerts
              method: GET
              description: Retrieve security alerts
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum number of alerts to return
                - name: status
                  in: query
                  type: string
                  required: false
                  description: Filter by alert status
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: events
          path: /events
          description: Security event ingestion
          operations:
            - name: ingest-events
              method: POST
              description: Ingest security event documents into the platform
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  events: "{{tools.events}}"

        - name: watchlists
          path: /watchlists
          description: Watchlist management
          operations:
            - name: list-watchlists
              method: GET
              description: Retrieve all watchlists
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-watchlist
              method: POST
              description: Create a new watchlist
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  entries: "{{tools.entries}}"

        - name: sensors
          path: /sensors
          description: Sensor monitoring
          operations:
            - name: list-sensors
              method: GET
              description: Retrieve all registered sensors
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: reports
          path: /reports
          description: Security report management
          operations:
            - name: list-reports
              method: GET
              description: Retrieve available security reports
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-report
              method: POST
              description: Generate a new security report
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  type: "{{tools.type}}"

        - name: playbooks
          path: /playbooks
          description: ATH Playbook response actions
          operations:
            - name: list-playbooks
              method: GET
              description: Retrieve all playbooks
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-playbook
              method: POST
              description: Create a new ATH Playbook response action
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  trigger: "{{tools.trigger}}"
                  actions: "{{tools.actions}}"

  exposes:
    - type: rest
      port: 8100
      namespace: stellar-cyber-api
      resources:
        - path: /v1/cases
          name: cases
          description: Security case management
          operations:
            - method: GET
              name: list-cases
              description: List all security cases
            - method: POST
              name: create-case
              description: Create a new security case
        - path: /v1/alerts
          name: alerts
          description: Security alert management
          operations:
            - method: GET
              name: list-alerts
              description: List all alerts
        - path: /v1/tenants
          name: tenants
          description: Tenant administration
          operations:
            - method: GET
              name: list-tenants
              description: List all tenants

    - type: mcp
      port: 9100
      namespace: stellar-cyber-mcp
      transport: http
      tools:
        - name: list-cases
          description: Retrieve security cases from Stellar Cyber Open XDR
          hints:
            readOnly: true
            openWorld: true
        - name: create-case
          description: Create a new security case in Stellar Cyber
          hints:
            readOnly: false
            destructive: false
        - name: list-alerts
          description: Retrieve security alerts from the platform
          hints:
            readOnly: true
            openWorld: true
        - name: ingest-events
          description: Ingest security event documents into Stellar Cyber
          hints:
            readOnly: false
            destructive: false
        - name: list-tenants
          description: List all tenants on the platform
          hints:
            readOnly: true
            openWorld: true
        - name: list-sensors
          description: List all registered sensors
          hints:
            readOnly: true
            openWorld: true
