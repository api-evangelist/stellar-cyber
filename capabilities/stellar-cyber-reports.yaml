naftiko: 1.0.0-alpha2
info:
  label: Stellar Cyber Open XDR API — Reports
  description: 'Stellar Cyber Open XDR API — Reports. 3 operations. Lead operation: List Reports. Self-contained Naftiko capability
    covering one Stellar Cyber business surface.'
  tags:
  - Stellar Cyber
  - Reports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STELLAR_CYBER_API_KEY: STELLAR_CYBER_API_KEY
capability:
  consumes:
  - type: http
    namespace: stellar-cyber-reports
    baseUri: https://{platformHostname}/connect/api/v1
    description: Stellar Cyber Open XDR API — Reports business capability. Self-contained, no shared references.
    resources:
    - name: reports
      path: /reports
      operations:
      - name: listreports
        method: GET
        description: List Reports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createreport
        method: POST
        description: Create Report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: reports-reportId
      path: /reports/{reportId}
      operations:
      - name: deletereport
        method: DELETE
        description: Delete Report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.STELLAR_CYBER_API_KEY}}'
  exposes:
  - type: rest
    namespace: stellar-cyber-reports-rest
    port: 8080
    description: REST adapter for Stellar Cyber Open XDR API — Reports. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/reports
      name: reports
      description: REST surface for reports.
      operations:
      - method: GET
        name: listreports
        description: List Reports
        call: stellar-cyber-reports.listreports
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createreport
        description: Create Report
        call: stellar-cyber-reports.createreport
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/reports/{reportid}
      name: reports-reportid
      description: REST surface for reports-reportId.
      operations:
      - method: DELETE
        name: deletereport
        description: Delete Report
        call: stellar-cyber-reports.deletereport
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stellar-cyber-reports-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stellar Cyber Open XDR API — Reports. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-reports
      description: List Reports
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stellar-cyber-reports.listreports
      outputParameters:
      - type: object
        mapping: $.
    - name: create-report
      description: Create Report
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stellar-cyber-reports.createreport
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-report
      description: Delete Report
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: stellar-cyber-reports.deletereport
      outputParameters:
      - type: object
        mapping: $.
