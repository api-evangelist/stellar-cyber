naftiko: 1.0.0-alpha2
info:
  label: Stellar Cyber Open XDR API — Playbooks
  description: 'Stellar Cyber Open XDR API — Playbooks. 2 operations. Lead operation: List Playbooks. Self-contained Naftiko
    capability covering one Stellar Cyber business surface.'
  tags:
  - Stellar Cyber
  - Playbooks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STELLAR_CYBER_API_KEY: STELLAR_CYBER_API_KEY
capability:
  consumes:
  - type: http
    namespace: stellar-cyber-playbooks
    baseUri: https://{platformHostname}/connect/api/v1
    description: Stellar Cyber Open XDR API — Playbooks business capability. Self-contained, no shared references.
    resources:
    - name: playbooks
      path: /playbooks
      operations:
      - name: listplaybooks
        method: GET
        description: List Playbooks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createplaybook
        method: POST
        description: Create Playbook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.STELLAR_CYBER_API_KEY}}'
  exposes:
  - type: rest
    namespace: stellar-cyber-playbooks-rest
    port: 8080
    description: REST adapter for Stellar Cyber Open XDR API — Playbooks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/playbooks
      name: playbooks
      description: REST surface for playbooks.
      operations:
      - method: GET
        name: listplaybooks
        description: List Playbooks
        call: stellar-cyber-playbooks.listplaybooks
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createplaybook
        description: Create Playbook
        call: stellar-cyber-playbooks.createplaybook
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stellar-cyber-playbooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stellar Cyber Open XDR API — Playbooks. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-playbooks
      description: List Playbooks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stellar-cyber-playbooks.listplaybooks
      outputParameters:
      - type: object
        mapping: $.
    - name: create-playbook
      description: Create Playbook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stellar-cyber-playbooks.createplaybook
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
