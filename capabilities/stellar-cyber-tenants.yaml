naftiko: 1.0.0-alpha2
info:
  label: Stellar Cyber Open XDR API — Tenants
  description: 'Stellar Cyber Open XDR API — Tenants. 5 operations. Lead operation: List Tenants. Self-contained Naftiko capability
    covering one Stellar Cyber business surface.'
  tags:
  - Stellar Cyber
  - Tenants
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STELLAR_CYBER_API_KEY: STELLAR_CYBER_API_KEY
capability:
  consumes:
  - type: http
    namespace: stellar-cyber-tenants
    baseUri: https://{platformHostname}/connect/api/v1
    description: Stellar Cyber Open XDR API — Tenants business capability. Self-contained, no shared references.
    resources:
    - name: tenants
      path: /tenants
      operations:
      - name: listtenants
        method: GET
        description: List Tenants
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createtenant
        method: POST
        description: Create Tenant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tenants-tenantId
      path: /tenants/{tenantId}
      operations:
      - name: gettenant
        method: GET
        description: Get Tenant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatetenant
        method: PUT
        description: Update Tenant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletetenant
        method: DELETE
        description: Delete Tenant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.STELLAR_CYBER_API_KEY}}'
  exposes:
  - type: rest
    namespace: stellar-cyber-tenants-rest
    port: 8080
    description: REST adapter for Stellar Cyber Open XDR API — Tenants. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tenants
      name: tenants
      description: REST surface for tenants.
      operations:
      - method: GET
        name: listtenants
        description: List Tenants
        call: stellar-cyber-tenants.listtenants
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createtenant
        description: Create Tenant
        call: stellar-cyber-tenants.createtenant
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tenants/{tenantid}
      name: tenants-tenantid
      description: REST surface for tenants-tenantId.
      operations:
      - method: GET
        name: gettenant
        description: Get Tenant
        call: stellar-cyber-tenants.gettenant
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatetenant
        description: Update Tenant
        call: stellar-cyber-tenants.updatetenant
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletetenant
        description: Delete Tenant
        call: stellar-cyber-tenants.deletetenant
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stellar-cyber-tenants-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stellar Cyber Open XDR API — Tenants. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-tenants
      description: List Tenants
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stellar-cyber-tenants.listtenants
      outputParameters:
      - type: object
        mapping: $.
    - name: create-tenant
      description: Create Tenant
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stellar-cyber-tenants.createtenant
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-tenant
      description: Get Tenant
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stellar-cyber-tenants.gettenant
      outputParameters:
      - type: object
        mapping: $.
    - name: update-tenant
      description: Update Tenant
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: stellar-cyber-tenants.updatetenant
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-tenant
      description: Delete Tenant
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: stellar-cyber-tenants.deletetenant
      outputParameters:
      - type: object
        mapping: $.
