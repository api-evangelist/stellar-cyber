naftiko: 1.0.0-alpha2
info:
  label: Stellar Cyber Open XDR API — Alerts
  description: 'Stellar Cyber Open XDR API — Alerts. 2 operations. Lead operation: List Alerts. Self-contained Naftiko capability
    covering one Stellar Cyber business surface.'
  tags:
  - Stellar Cyber
  - Alerts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STELLAR_CYBER_API_KEY: STELLAR_CYBER_API_KEY
capability:
  consumes:
  - type: http
    namespace: stellar-cyber-alerts
    baseUri: https://{platformHostname}/connect/api/v1
    description: Stellar Cyber Open XDR API — Alerts business capability. Self-contained, no shared references.
    resources:
    - name: alerts
      path: /alerts
      operations:
      - name: listalerts
        method: GET
        description: List Alerts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Maximum number of alerts to return
        - name: offset
          in: query
          type: integer
          description: Pagination offset
        - name: status
          in: query
          type: string
          description: Filter by alert status
    - name: alerts-alertId
      path: /alerts/{alertId}
      operations:
      - name: updatealert
        method: PUT
        description: Update Alert
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.STELLAR_CYBER_API_KEY}}'
  exposes:
  - type: rest
    namespace: stellar-cyber-alerts-rest
    port: 8080
    description: REST adapter for Stellar Cyber Open XDR API — Alerts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/alerts
      name: alerts
      description: REST surface for alerts.
      operations:
      - method: GET
        name: listalerts
        description: List Alerts
        call: stellar-cyber-alerts.listalerts
        with:
          limit: rest.limit
          offset: rest.offset
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/alerts/{alertid}
      name: alerts-alertid
      description: REST surface for alerts-alertId.
      operations:
      - method: PUT
        name: updatealert
        description: Update Alert
        call: stellar-cyber-alerts.updatealert
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stellar-cyber-alerts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stellar Cyber Open XDR API — Alerts. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-alerts
      description: List Alerts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stellar-cyber-alerts.listalerts
      with:
        limit: tools.limit
        offset: tools.offset
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: update-alert
      description: Update Alert
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: stellar-cyber-alerts.updatealert
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
